{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVision | Charging Control</title>
    <style>
        :root { --brand-green: #03AC13; --error-red: #ff4d4d; }

        body { 
            margin: 0; padding: 0; 
            background: radial-gradient(circle, #234269 0%, #0d121a 100%); 
            font-family: 'Segoe UI', sans-serif; 
            color: white; 
            min-height: 100vh; /* Changed from fixed height */
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }
        
        header { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(15px); 
            padding: 0 50px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.08); 
            height: 70px; 
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 2000;
        }

        .left-nav { display: flex; align-items: center; gap: 30px; }
        .logo-section { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--brand-green); font-weight: bold; }
        .logo-section img { width: 35px; border-radius: 50%; }
        .nav-links { display: flex; gap: 20px; }
        .nav-link { color: #ccc; font-size: 0.8rem; text-decoration: none; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .nav-link.active { color: var(--brand-green); font-weight: bold; }
        
        .right-nav { display: flex; align-items: center; gap: 25px; }
        .user-greeting { font-size: 0.85rem; color: #aaa; }
        .logout-link { background: none; border: none; color: var(--error-red); font-size: 0.8rem; cursor: pointer; text-transform: uppercase; padding: 0; font-family: inherit; }

        .container { 
            max-width: 850px; 
            margin: 0 auto; 
            padding: 90px 20px 30px 20px; /* Top padding for header, bottom for breathing room */
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-sizing: border-box;
            flex-grow: 1;
            justify-content: center;
        }
        
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        
        .stat-card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px); 
            padding: 20px 15px; 
            border-radius: 20px; 
            text-align: center; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            transition: 0.3s;
        }
        .stat-card:hover { transform: translateY(-5px); border-color: var(--brand-green); }
        .stat-card.critical { border-color: var(--error-red); animation: pulse-red 1.5s infinite; }
        .stat-card p { margin: 0; color: #aaa; font-size: 0.75rem; letter-spacing: 1.5px; text-transform: uppercase; }
        .stat-card h2 { margin: 8px 0 0 0; font-size: 2.3rem; color: var(--brand-green); }

        .glass-panel { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(10px);
            padding: 25px; 
            border-radius: 25px; 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            text-align: center;
        }
        
        .panel-title { margin: 0 0 15px 0; color:var(--brand-green); font-size: 1.3rem; letter-spacing: 1px; }

        .control-box { 
            max-width: 400px; 
            margin: 0 auto; 
            background: rgba(255, 255, 255, 0.02); 
            padding: 18px; 
            border-radius: 15px; 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        .control-box label { display: block; margin-bottom: 8px; font-size: 0.75rem; color: var(--brand-green); text-transform: uppercase; font-weight: bold; }
        
        .input-wrapper { display: flex; align-items: center; background: rgba(0, 0, 0, 0.3); border-radius: 8px; padding: 10px 15px; border: 1px solid rgba(255, 255, 255, 0.1); }
        input { background: none; border: none; color: white; width: 100%; outline: none; font-size: 1.1rem; text-align: center; }
        
        .btn-action { width: 100%; margin-top: 15px; padding: 12px; background: rgba(3, 172, 19, 0.1); border: 1px solid var(--brand-green); color: var(--brand-green); border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-action:hover { background: var(--brand-green); color: white; }
        
        .btn-emergency { background: #cc0000; color: white; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 15px; text-transform: uppercase; transition: 0.3s; }
        .btn-resume { background: var(--brand-green); color: white; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 15px; text-transform: uppercase; }
        .btn-alarm-stop { background: #ffcc00; color: #000; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 15px; text-transform: uppercase; animation: flash 0.5s infinite; }

        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(255, 77, 77, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0); } }
        @keyframes flash { 50% { background: #ff4444; color: white; } }

        #notification-container { position: fixed; top: 85px; right: 20px; z-index: 9999; }
        .toast { min-width: 250px; padding: 15px; margin-bottom: 10px; border-radius: 10px; color: white; font-weight: 600; font-size: 0.9rem; animation: slideIn 0.4s ease forwards; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .toast.error { background: rgba(255, 50, 50, 0.95); border-left: 5px solid #ff0000; }
        .toast.success { background: rgba(0, 200, 100, 0.95); border-left: 5px solid #006633; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>
    <audio id="alarmSound" loop preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3" type="audio/mpeg">
    </audio>

    <div id="notification-container"></div>
    
    <header>
        <div class="left-nav">
            <a href="{% url 'dashboard' %}" class="logo-section">
                <img src="{% static 'charger/images/evision_logo.jpeg' %}" alt="Logo">
                <span>EVISION</span>
            </a>
            <nav class="nav-links">
                <a href="{% url 'dashboard' %}" class="nav-link">Home</a>
                <a href="{% url 'charging' %}" class="nav-link active">Charging</a>
                <a href="{% url 'map_page' %}" class="nav-link">Find Map</a>
                <a href="{% url 'about' %}" class="nav-link">About</a>
            </nav>
        </div>
        <div class="right-nav">
            <span class="user-greeting">Hello, {{ user.username }}!</span>
            <form action="{% url 'logout' %}" method="post" style="display:inline-block; margin-left: 15px;">
                {% csrf_token %}
                <button type="submit" class="logout-link">Logout</button>
            </form>
        </div>
    </header>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <p>Output Voltage</p>
                <h2 id="voltageDisplay">0 V</h2>
            </div>
            <div id="temp-card" class="stat-card">
                <p>Battery Temp</p>
                <h2 id="tempDisplay">35.0°C</h2>
            </div>
        </div>

        <div class="glass-panel">
            <h2 class="panel-title">Charging Control</h2>
            <button id="toggleBtn" class="btn-resume" onclick="toggleCharging()">
            Start Charging
            </button>  
        </div>
    </div>

    <script>
document.addEventListener("DOMContentLoaded", function(){

  const btn = document.getElementById("toggleBtn");
  const alarm = document.getElementById("alarmSound");
  const tempCard = document.getElementById("temp-card");

  let state = "idle";
  let interval = null;
  let cooldownInterval = null;

  function setFirebaseChargingState(value) {
  fetch('/api/set-charging/', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ charging_state: value })
  })
   .then(res => res.json())
   .then(data => {
    if (data.success && onSuccess) onSuccess(); // confirm hone ke baad UI update
  })
  .catch(err => console.error('Firebase set error:', err));
}

// ─── Page load pe Firebase se button state set karo ────
function initButtonState() {
  fetch('/api/charger-data/')
    .then(res => res.json())
    .then(data => {
      if (data.charging_state === true) {
        state = "charging";
        btn.innerText = "Stop Charging";
        btn.className = "btn-emergency";
      } else {
        state = "idle";
        btn.innerText = "Start Charging";
        btn.className = "btn-resume";
      }
    })
    .catch(err => console.error('Init error:', err));
}

// Page load pe call karo
initButtonState();

  // ─── Firebase se live data fetch ───────────────────────
  function fetchLiveData() {
    fetch('/api/charger-data/')
      .then(res => res.json())
      .then(data => {
        document.getElementById("voltageDisplay").innerText = data.voltage.toFixed(1) + " V";
        document.getElementById("tempDisplay").innerText = data.temperature.toFixed(1) + "°C";

        // Temperature high hai toh card red karo
        if (data.temperature >= 60) {
          tempCard.classList.add("critical");
        } else {
          tempCard.classList.remove("critical");
        }
      })
      .catch(err => console.error('Firebase fetch error:', err));
  }

  setInterval(fetchLiveData, 1000);
  fetchLiveData(); // Page load pe bhi

  // ─── Toast ─────────────────────────────────────────────
  function showToast(msg, type) {
    const container = document.getElementById('notification-container');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerText = msg;
    container.appendChild(toast);
    setTimeout(() => {
      toast.style.opacity = '0';
      setTimeout(() => toast.remove(), 500);
    }, 5000);
  }

  // ─── Button Logic ──────────────────────────────────────
  window.toggleCharging = function() {
    if (state === "idle")     startCharging();
    else if (state === "charging") stopCharging();
    else if (state === "paused")   resumeCharging();
    else if (state === "alarm")    stopAlarm();
  }

  function startCharging() {
    // Firebase se latest temp check karo
    fetch('/api/charger-data/')
      .then(res => res.json())
      .then(data => {
        if (data.temperature >= 60) {
          showToast("Temp high! Cannot start", "error");
          return;
        }
        
        state = "charging";
        btn.innerText = "Stop Charging";
        btn.className = "btn-emergency";
        setFirebaseChargingState(true);
        showToast("Charging Started", "success");
      });
  }

  function stopCharging() {
    state = "paused";
    btn.innerText = "Resume Charging";
    btn.className = "btn-resume";
    setFirebaseChargingState(false); 
    showToast("Charging Stopped", "error");
  }

  function resumeCharging() {
    fetch('/api/charger-data/')
      .then(res => res.json())
      .then(data => {
        if (data.temperature >= 60) {
          showToast("Temp still high! Cannot resume", "error");
          return;
        }
        state = "charging";
        btn.innerText = "Stop Charging";
        btn.className = "btn-emergency";
        setFirebaseChargingState(true);
        showToast("Charging Resumed", "success");
      });
  }

  function highTemp() {
    state = "alarm";
    btn.innerText = "Stop Alarm";
    btn.className = "btn-alarm-stop";
    alarm.play();
    tempCard.classList.add("critical");
    setFirebaseChargingState(false);     
    showToast("⚠ High Temperature! Charging Stopped", "error");
  }

  function stopAlarm() {
    alarm.pause();
    alarm.currentTime = 0;
    state = "paused";
    btn.innerText = "Resume Charging";
    btn.className = "btn-resume";
    showToast("Alarm Stopped", "success");
  }

  // ─── Temperature alarm — Firebase se monitor ───────────
  setInterval(() => {
    if (state === "charging") {
      fetch('/api/charger-data/')
        .then(res => res.json())
        .then(data => {
          if (data.temperature >= 60) {
            highTemp();
          }
        });
    }
  }, 1000);

});
</script>
</body>
</html>
