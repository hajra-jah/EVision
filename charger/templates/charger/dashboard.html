{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVision | Dashboard</title>
    <style>
        :root { --brand-green: #03AC13; }

        body { 
            margin: 0; padding: 0; 
            background: radial-gradient(circle, #234269 0%, #0d121a 100%); 
            font-family: 'Segoe UI', sans-serif; 
            color: white; 
            min-height: 100vh; 
            overflow-x: hidden; 
        }
        
        header { 
            background: hsla(0, 0%, 100%, 0.03); 
            backdrop-filter: blur(15px); 
            padding: 10px 50px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.08); 
            height: 60px;
        }

        .left-nav { display: flex; align-items: center; gap: 30px; }
        .logo-section { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--brand-green); font-weight: bold; }
        .logo-section img { width: 30px; border-radius: 50%; }
        .nav-links { display: flex; gap: 20px; }
        .nav-link { color: #ccc; font-size: 0.8rem; text-decoration: none; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { color: var(--brand-green); text-shadow: 0 0 10px rgba(3, 172, 19, 0.5); }
        
        .right-nav { display: flex; align-items: center; gap: 20px; }
        .user-greeting { font-size: 0.85rem; color: #aaa; }
        .logout-link { background: none; border: none; color: #ff4d4d; font-size: 0.8rem; cursor: pointer; text-transform: uppercase; padding: 0; font-family: inherit; transition: 0.3s; }

        .dashboard-container { 
            max-width: 900px; 
            margin: 40px auto; 
            padding: 0 20px 60px 20px; /* Bottom padding for breathing space */
            text-align: center; 
        }

        .welcome-msg h1 { font-size: 1.8rem; margin-bottom: 30px; color: var(--brand-green); letter-spacing: 1px; }
        
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 20px; 
        }
        
        .stat-card { 
            background: rgba(255, 255, 255, 0.04); 
            backdrop-filter: blur(12px); 
            padding: 25px 15px; /* Reduced padding for smaller cards */
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            transition: 0.4s; 
        }

        .stat-card:hover { 
            transform: translateY(-5px); 
            border-color: var(--brand-green); 
            background: rgba(255, 255, 255, 0.07);
        }

        .stat-card p { margin: 0; color: #aaa; letter-spacing: 1.5px; font-size: 0.7rem; text-transform: uppercase; }
        .stat-card h2 { margin: 10px 0 0 0; font-size: 2.2rem; color: var(--brand-green); font-weight: 600; }
        .unit { font-size: 0.9rem; color: #aaa; margin-left: 4px; }
        
        /* Toast Notification Styles */
        .toast { min-width: 200px; padding: 12px 20px; margin-bottom: 10px; border-radius: 8px; color: white; font-size: 0.85rem; backdrop-filter: blur(10px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); animation: slideIn 0.5s ease forwards; }
        .toast.success { background: rgba(0, 255, 136, 0.95); border-left: 5px solid #009955; color: #0d121a; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

<header>
    <div class="left-nav">
        <a href="{% url 'dashboard' %}" class="logo-section">
            <img src="{% static 'charger/images/evision_logo.jpeg' %}" alt="Logo">
            <span>EVISION</span>
        </a>
        <nav class="nav-links">
            <a href="{% url 'dashboard' %}" class="nav-link active">Home</a>
            <a href="{% url 'charging' %}" class="nav-link">Charging</a>
            <a href="{% url 'map_page' %}" class="nav-link">Find Map</a>
            <a href="{% url 'about' %}" class="nav-link">About</a>
        </nav>
    </div>
    <div class="right-nav">
        <span class="user-greeting">Hello, {{ user.username }}!</span>
        <form action="{% url 'logout' %}" method="post" style="display:flex;">
            {% csrf_token %}
            <button type="submit" class="logout-link">Logout</button>
        </form>
    </div>
</header>

<div class="dashboard-container">
    <div class="welcome-msg">
        <h1>EVision Dashboard</h1>
    </div>

    <div id="notification-container" style="position: fixed; top: 20px; right: 20px; z-index: 9999;"></div>

    <div class="stats-grid">
        <div class="stat-card">
            <p>Charging State</p>
            <h2 id="charging-state">OFF</h2>
        </div>
        <div class="stat-card">
            <p>Battery Temp</p>
            <h2>35<span class="unit">°C</span></h2>
        </div>
        <div class="stat-card">
            <p>Power Flow</p>
            <h2>4.2<span class="unit">kW</span></h2>
        </div>
        <div class="stat-card">
            <p>Energy Used</p>
            <h2>12.8<span class="unit">kWh</span></h2>
        </div>
    </div>
</div>
<script>
function fetchLiveData() {
  fetch('/api/charger-data/')
    .then(res => res.json())
    .then(data => {

      // Power Flow card
      document.querySelector('.stats-grid .stat-card:nth-child(3) h2').innerHTML =
        data.power_kw + '<span class="unit">kW</span>';

      // Energy Used card
      document.querySelector('.stats-grid .stat-card:nth-child(4) h2').innerHTML =
        data.energy_used + '<span class="unit">kWh</span>';

      // Temperature card
      document.querySelector('.stats-grid .stat-card:nth-child(2) h2').innerHTML =
        data.temperature + '<span class="unit">°C</span>';

      // Charging State
      const stateEl = document.getElementById('charging-state');
      if (data.charging_state) {
        stateEl.textContent = 'ON';
        
      } else {
        stateEl.textContent = 'OFF';
      }
    })
    .catch(err => console.error('Firebase fetch error:', err));
}

setInterval(fetchLiveData, 3000);
fetchLiveData();
</script>
</body>
</html>
