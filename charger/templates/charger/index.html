{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EVision | Welcome</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background-color: #1a1a1a; /* Fallback color */
        }

        #splash {
            position: fixed;
            width: 100%;
            height: 100%;
            /* Logo ke background se match karta hua premium gradient */
            background: radial-gradient(circle, #234269 0%, #0d121a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .logo-container {
            width: 300px; /* Specific width */
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: pulse 2.5s infinite ease-in-out;
        }

        .logo-container img {
            max-width: 65%;
            height: auto;
            object-fit: contain;
            /* Blue/Green glow effect */
            filter: drop-shadow(0 0 15px rgba(0, 255, 136, 0.4));
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }
    </style>
</head>
<body>

    <div id="splash">
        <div class="logo-container">
            <img src="{% static 'charger/images/evision_logo.jpeg' %}" alt="EVision Logo">
        </div>
    </div>

    <script>
        // 5 seconds baad redirect karega
        setTimeout(() => {
            window.location.href = "{% url 'login' %}"; 
        }, 5000);
    </script>
</body>
</html>
