{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EVision | Google Maps Finder</title>
    <style>
        :root { --brand-green: #03AC13; }
        body { margin: 0; background: #0d121a; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        header { 
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); 
            padding: 10px 50px; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.08); height: 60px;
        }

        .logo-section { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--brand-green); font-weight: bold; }
        .back-btn { color: #ccc; text-decoration: none; font-size: 0.8rem; text-transform: uppercase; }

        /* Google Map Frame */
        .map-frame-container {
            height: calc(100vh - 60px);
            width: 100%;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            /* Filter to make map look slightly darker to match your theme */
            filter: contrast(1.1) brightness(0.9);
        }
    </style>
</head>
<body>

    <header>
        <a href="{% url 'dashboard' %}" class="logo-section">
            <img src="{% static 'charger/images/evision_logo.jpeg' %}" alt="Logo" style="width:30px; border-radius:50%;">
            <span>EVISION MAPS</span>
        </a>
        <a href="{% url 'dashboard' %}" class="back-btn">← Back to Dashboard</a>
    </header>

    <div class="map-frame-container">
        <iframe 
            src="https://www.google.com/maps/embed?pb=!1m16!1m12!1m12!3m2!1i1024!2i768!4f13.1!2m1!1sev%20charging%20stations!5e0!3m2!1sen!2spk!4v1700000000000!5m2!1sen!2spk" 
            allowfullscreen="" 
            loading="lazy" 
            referrerpolicy="no-referrer-when-downgrade">
        </iframe>
    </div>

</body>
</html>
